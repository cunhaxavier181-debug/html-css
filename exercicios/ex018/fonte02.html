<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fontes externas</title>
    <style>
      @font-face {
        font-family: "Love";
        src: url("./fontes/LoveLight-Regular.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: "Roboto";
        src: url("./fontes/Roboto-Italic-VariableFont_wdth\,wght.ttf")
          format("trutype");
        font-weight: normal;
        font-style: normal;
      }
      body {
        font-family: "Love", sans-serif;
        font-size: 1.8em;
      }
      h1 {
        font-family: "Roboto", sans-serif;
        font-size: 3em;
        font-weight: normal;
      }
    </style>
  </head>
  <body>
    <h1>Título</h1>
    <p>
      Lorem ipsum dolor, sit amet consectetur adipisicing elit. Modi et illo
      unde aliquid soluta, possimus in iusto labore nihil rerum deserunt aliquam
      a impedit dolorum vero vel nostrum. Perspiciatis, assumenda.
    </p>
  </body>
</html>
