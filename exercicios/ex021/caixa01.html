<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{
           padding: 21px 10px 2px;
           margin: 10px;
           background-color: rgba(211, 211, 211, 0.509);
           width: 380px;
           height: 60px;
           border: 10px solid rgba(47, 79, 79, 0.32);
           outline: 2px dashed rgba(0, 0, 0, 0.124);
        }
        a{
            border: 5px groove rgba(255, 0, 0, 0.37);
            padding: 5px;
            margin: 10px;
        }
        p{
            text-align: justify;
            text-indent: 30px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragrafos também são exemplos de caixa box-level, mas os
    <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
