<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estudos de iframe</title>
    <style>
      iframe {
        width: 300px;
        height: 150px;
      }
    </style>
    <!--Tamanho padrão do iframe é 300px de largura por 150px de altura-->
  </head>
  <body>
    <h1>Testando o uso de iframe</h1>
    <p>
      Acessando o site do
      <iframe src="https://www.cursoemvideo.com" frameborder="1" scolling="no"
        ><a href="https://www.cursoemvideo.com" target="_blank"
          >Curso em video</a
        ></iframe
      >
      para aprender a programar.
    </p>
    <p>
      O repositório do Guanabara
      <iframe src="https://gustavoguanabara.github.io" frameborder="0"
        >no<a href="https://gustavoguanabara.github.io" target="_blank"
          >GitHub</a
        ></iframe
      >também é bem legal.
    </p>
  </body>
</html>
