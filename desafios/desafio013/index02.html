<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tabela desafio</title>
   <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
    }
    table{
      width: 350px;
      height: 0px;
    }
    td{
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }
    #item{
      box-shadow: 1px 0px 0px black;
    }
  </style>
</head>
<body>
  <table>
    <tr>
      <td colspan="4">A</td>
      <td rowspan="4">B</td>
    </tr>
    <tr>
      <td rowspan="4">C</td>
      <td id="item">D</td>
      <td>E</td>
      <td>F</td>
    </tr>
    <tr>
      <td id="item">G</td>
      <td>H</td>
      <td>I</td>
    </tr>
    <tr>
      <td id="item">J</td>
      <td>L</td>
      <td>M</td>
    </tr>
    <tr>
      <td colspan="4">N</td>
    </tr>
  </table>
</body>
</html>
