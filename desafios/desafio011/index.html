<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio Astronauta</title>
  <style>
    .container{
      position: relative;
      width: 100%;
      height: 100vh;
      background-image: url('./imagens/espaco.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .overlay{
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 40%;
      height: auto;
    }
  </style>
</head>
<body>
  <h1>Desafio do Astronauta</h1>
  <div class="container">
    <img src="./imagens/astronauta.png" alt="imagem sobreposta" class="overlay">
  </div>
</body>
</html>
